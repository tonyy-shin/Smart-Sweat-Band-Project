[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
upload_speed = 921600
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit SHT4x@^1.0.0
    adafruit/Adafruit BusIO@^1.14.0
    wire

build_flags =
    -DARDUINO_XIAO_ESP32S3
    -std=c++17
    -Wall
    -Wextra

[platformio]
default_envs = xiao_esp32s3
